<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Landscape Metrics Game</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

canvas{
border:2px solid #333;
margin-top:10px;
width:90vw;
max-width:500px;
aspect-ratio:1/1;
}

.panel{
width:90%;
max-width:500px;
margin:auto;
background:#1f1f1f;
padding:10px;
border-radius:8px;
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}

td,th{
border:1px solid #444;
padding:5px;
}

</style>
</head>

<body>

<h2>Landscape Metrics Planner</h2>

<canvas id="map" width="500" height="500"></canvas>

<div class="panel">

<h3>Metrics</h3>

<table>

<tr>
<th>Metric</th>
<th>Target</th>
<th>Scenario</th>
</tr>

<tr>
<td>Forest Cover</td>
<td>≥ 40%</td>
<td id="forest"></td>
</tr>

<tr>
<td>Patch Density</td>
<td>≤ 0.20</td>
<td id="pd"></td>
</tr>

<tr>
<td>Largest Patch</td>
<td>≥ 20%</td>
<td id="lpi"></td>
</tr>

</table>

<button onclick="resetMap()">Reset</button>

</div>

<script>

const rows=20
const cols=20
const cell=25

const canvas=document.getElementById("map")
const ctx=canvas.getContext("2d")

let grid=[]

function init(){

for(let r=0;r<rows;r++){

grid[r]=[]

for(let c=0;c<cols;c++){

grid[r][c]="urban"

}

}

draw()

}

canvas.addEventListener("click",function(e){

const rect=canvas.getBoundingClientRect()

const scaleX=canvas.width/rect.width
const scaleY=canvas.height/rect.height

let x=(e.clientX-rect.left)*scaleX
let y=(e.clientY-rect.top)*scaleY

let r=Math.floor(y/cell)
let c=Math.floor(x/cell)

toggleCell(r,c)

draw()

})

function toggleCell(r,c){

if(grid[r][c]=="urban") grid[r][c]="forest"
else grid[r][c]="urban"

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let r=0;r<rows;r++){
for(let c=0;c<cols;c++){

if(grid[r][c]=="forest") ctx.fillStyle="#00aa55"
else ctx.fillStyle="#444"

ctx.fillRect(c*cell,r*cell,cell,cell)

ctx.strokeStyle="#222"
ctx.strokeRect(c*cell,r*cell,cell,cell)

}
}

calculateMetrics()

}

function calculateMetrics(){

let forestCount=0

for(let r=0;r<rows;r++){
for(let c=0;c<cols;c++){

if(grid[r][c]=="forest") forestCount++

}
}

let total=rows*cols

let forestCover=(forestCount/total)*100

document.getElementById("forest").innerText=forestCover.toFixed(1)+" %"

let patches=0
let visited={}

for(let r=0;r<rows;r++){
for(let c=0;c<cols;c++){

if(grid[r][c]=="forest" && !visited[r+"-"+c]){

patches++

let stack=[[r,c]]

while(stack.length){

let [rr,cc]=stack.pop()

let key=rr+"-"+cc

if(visited[key]) continue

visited[key]=true

[[1,0],[-1,0],[0,1],[0,-1]].forEach(d=>{

let nr=rr+d[0]
let nc=cc+d[1]

if(nr>=0 && nr<rows && nc>=0 && nc<cols){

if(grid[nr][nc]=="forest"){

stack.push([nr,nc])

}

}

})

}

}

}
}

let pd=patches/(rows*cols)

document.getElementById("pd").innerText=pd.toFixed(3)

let largest=0
visited={}

for(let r=0;r<rows;r++){
for(let c=0;c<cols;c++){

if(grid[r][c]=="forest" && !visited[r+"-"+c]){

let size=0

let stack=[[r,c]]

while(stack.length){

let [rr,cc]=stack.pop()

let key=rr+"-"+cc

if(visited[key]) continue

visited[key]=true

size++

[[1,0],[-1,0],[0,1],[0,-1]].forEach(d=>{

let nr=rr+d[0]
let nc=cc+d[1]

if(nr>=0 && nr<rows && nc>=0 && nc<cols){

if(grid[nr][nc]=="forest"){

stack.push([nr,nc])

}

}

})

}

if(size>largest) largest=size

}

}
}

let lpi=(largest/(rows*cols))*100

document.getElementById("lpi").innerText=lpi.toFixed(1)+" %"

}

function resetMap(){

init()

}

init()

</script>

</body>
</html>
